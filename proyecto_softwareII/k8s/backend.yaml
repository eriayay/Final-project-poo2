# ─── k8s/backend.yaml ────────────────────────────────────────────────────────
# Deployment + Service del backend Django
# Cambia el número de "replicas" según el escenario que estés midiendo (1, 2 o 3)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 1          # ← CAMBIA AQUÍ: 1, 2 o 3 según el escenario
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: proyecto_softwareii-backend:latest    # nombre que le darás al build local
          imagePullPolicy: Never          # usa imagen local (minikube/kind)
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secrets     # DATABASE_URL, SECRET_KEY
            - configMapRef:
                name: backend-config      # DEBUG, ALLOWED_HOSTS
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/products/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: backend                # Este nombre es el que usa nginx para el proxy
  namespace: default
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP              # Solo accesible dentro del cluster (nginx hace el proxy)
