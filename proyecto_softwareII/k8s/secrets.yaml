# ─── k8s/secrets.yaml ────────────────────────────────────────────────────────
# Almacena las variables sensibles del backend (DATABASE_URL, SECRET_KEY, etc.)
# Los valores deben estar codificados en base64.
#
# Para codificar un valor:  echo -n "tu_valor" | base64
# Para decodificar:         echo "dmFsb3I=" | base64 --decode
#
# ⚠️  NUNCA subas este archivo con valores reales a GitHub.
#      Agrega secrets.yaml a tu .gitignore
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: default
type: Opaque
data:
  # Reemplaza los valores con: echo -n "tu_valor_real" | base64
  # Ejemplo DATABASE_URL: postgres://user:pass@host/dbname
  DATABASE_URL: <BASE64_DE_TU_DATABASE_URL>
  SECRET_KEY: <BASE64_DE_TU_SECRET_KEY>

---
# ConfigMap para variables no sensibles
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: default
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  DJANGO_SETTINGS_MODULE: "config.settings"   # ⚠️ Ajusta "config" si tu carpeta tiene otro nombre
