# ─── nginx.conf ─────────────────────────────────────────────────────────────
# Sirve el build de React y hace proxy de /api/ al backend Django
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy de llamadas API al backend Django
    # "backend" es el nombre del servicio en docker-compose y en K8s
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy del admin de Django (opcional pero útil)
    location /admin/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # Archivos estáticos de Django (CSS del admin, etc.)
    location /static/ {
        proxy_pass http://backend:8000;
    }

    # React SPA: todas las rutas sirven index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
